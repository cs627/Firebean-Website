[build]
  command = "mkdir -p dist && cp index.html work.html profile.html 404.html dist/ && cp favicon.ico favicon-32x32.png favicon-16x16.png apple-touch-icon.png dist/ 2>/dev/null; cp -r public/* dist/ 2>/dev/null; mkdir -p dist/src && cp src/cms.js src/translations.js dist/src/; mkdir -p dist/data && cp -r data/* dist/data/"
  publish = "dist"
  edge_functions = "netlify/edge-functions"

[[redirects]]
  from = "/work"
  to = "/work.html"
  status = 200

[[redirects]]
  from = "/profile"
  to = "/profile.html"
  status = 200

# Custom 404 error page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
