<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsubscribe — Firebean 公關市場解碼</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #EBEBEB; font-family: 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #FFFFFF; border: 1px solid #E0E0E0; max-width: 480px; width: 100%; padding: 40px 36px; }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo img { width: 32px; height: 32px; object-fit: contain; }
    .logo span { font-size: 16px; font-weight: 300; color: #111111; letter-spacing: 0.2em; text-transform: uppercase; }
    h1 { font-size: 20px; font-weight: 900; color: #111111; margin-bottom: 10px; line-height: 1.3; }
    p { font-size: 13px; color: #555555; line-height: 1.75; margin-bottom: 20px; }
    .btn {
      display: block; width: 100%; background: #E8291C; color: #FFFFFF;
      font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 13px 28px;
      border: none; cursor: pointer; font-family: inherit;
      text-decoration: none; text-align: center;
    }
    .btn:hover { background: #c0201a; }
    .back { display: block; margin-top: 16px; font-size: 11px; color: #AAAAAA; text-align: center; }
    .back a { color: #AAAAAA; text-decoration: none; }
    .back a:hover { color: #E8291C; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663437368766/OXsmmaNIDdCdSALu.png" alt="Firebean">
      <span>Firebean</span>
    </div>

    <div id="form-section">
      <h1>Unsubscribe from<br>公關市場解碼</h1>
      <p>We are sorry to see you go. To unsubscribe from the Firebean weekly PR market insights newsletter, please click the button below to confirm your request.</p>

      <a id="unsub-link" href="https://docs.google.com/forms/d/e/1FAIpQLSeKfP4L4gcXOs6i_8bpPRcSJSeAl2GojmoU6TGfU8_Hb2q7oQ/viewform" class="btn">Confirm Unsubscribe</a>

      <a href="https://firebean.net" class="back">← Keep me subscribed / Back to firebean.net</a>
    </div>
  </div>

  <script>
    // ── Pass email from URL to Google Form if present ──
    (function() {
      var params = new URLSearchParams(window.location.search);
      var email  = params.get('email');
      var formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSeKfP4L4gcXOs6i_8bpPRcSJSeAl2GojmoU6TGfU8_Hb2q7oQ/viewform";
      
      if (email) {
        // entry.29af813b is the ID for the "Email Address" field in the form
        var fullUrl = formUrl + "?entry.29af813b=" + encodeURIComponent(email);
        document.getElementById('unsub-link').href = fullUrl;
      }
    })();
  </script>
</body>
</html>
